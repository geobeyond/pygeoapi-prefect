site_name: pygeoapi-prefect
repo_url: https://github.com/geobeyond/pygeoapi-prefect
repo_name: pygeoapi-prefect
site_description: pygeoapi process manager powered by prefect
site_author: geobeyond
edit_uri: edit/main/docs/

nav:
  - Home: 'index.md'
  - User Guide: 'user-guide.md'
  - Development: 'development.md'
  - Examples:
    - Run processes inside ephemeral docker containers: 'docker-example.md'

theme:
  name: material
  palette:
    primary: blue grey
    accent: pink
  features:
    - content.action.edit
    - content.tabs.link
    - header.autohide
    - navigation.footer
    - navigation.indexes
    - navigation.tabs
    - navigation.tabs.sticky

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
