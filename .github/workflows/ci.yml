name: Continuous Integration

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'mkdocs.yml'

  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'mkdocs.yml'

  # will run when called from another workflow
  workflow_call:
    outputs:
      artifact_name:
        description: "Name of the artifact containing the build package"
        value: ${{ jobs.run_ci.outputs.artifact_name }}


jobs:
  ci:
    runs-on: ubuntu-24.04
    env:
      ARTIFACT_NAME: "python-package"
    outputs:
      artifact_name: ${{ env.ARTIFACT_NAME }}
    steps:
      - name: "Grab code"
        uses: actions/checkout@v6.0.2

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: "Install uv"
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"

      - name: "Install the project"
        run: uv sync --locked --all-groups

      - name: "Run ruff formatter"
        run: uv run ruff format --check

      - name: "Run ruff linter"
        run: uv run ruff check

      - name: "Run ty"
        run: uv run ty check

      - name: "Run tests"
        run: uv run pytest

      - name: "Build Python package"
        run: uv build

      - name: "Upload built package as artifact"
        id: upload_package_artifact
        uses: actions/upload-artifact@v7.0.1
        if: ${{ github.event_name != 'pull_request' }}
        with:
          name: "${{ env.ARTIFACT_NAME }}"
          path: dist/
          retention-days: 2
